<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Fruit Ninja</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="game-container">
        <!-- Background element (static or slight animation) -->
        <div class="background" style="background-image: url('assets/game_bg.png')"></div>

        <!-- Hidden video element for MediaPipe -->
        <video id="input_video" class="hidden" autoplay playsinline></video>
        
        <!-- The Game Canvas -->
        <canvas id="output_canvas" width="1280" height="720"></canvas>

        <!-- UI Overlay: Score & Highscore -->
        <div class="hud" id="hud" style="display: none;">
            <div class="score-board">
                <div class="label">SCORE</div>
                <div class="value" id="score_val">0</div>
            </div>
            <div class="score-board high-score">
                <div class="label">BEST</div>
                <div class="value" id="highscore_val">0</div>
            </div>
            <div class="combo-display" id="combo_display">Combo x<span id="combo_val">1</span></div>
        </div>

        <!-- UI Overlay: Start Screen -->
        <div class="screen" id="start_screen">
            <h1 class="title">FRUIT<br><span>NINJA</span></h1>
            <p class="subtitle">AI Hand Gesture Edition</p>
            <div class="loading-status" id="loading_status">Loading AI Models...</div>
            
            <div style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--secondary); display: flex; align-items: center; gap: 15px; text-align: left; max-width: 450px;">
                <img src="assets/gesture_icon.png" alt="Gesture" style="width: 80px; height: 80px; filter: drop-shadow(0 0 10px var(--secondary)); border-radius: 10px;">
                <div>
                    <p style="color: var(--secondary); font-size: 1.2rem; font-weight: 700; margin-bottom: 5px;">🗡️ BLADE GESTURE REQUIRED</p>
                    <p style="color: #FFF; margin: 0; font-size: 0.9rem;">Make a <b>pointing gesture</b> (extend ONLY your index finger) to activate the blade!</p>
                </div>
            </div>

            <button class="btn" id="start_btn" disabled>PLAY NOW</button>
        </div>

        <!-- UI Overlay: Game Over Screen -->
        <div class="screen hidden" id="gameover_screen">
            <h1 class="title gameover-text">GAME OVER</h1>
            <div class="final-score-container">
                <p>Final Score: <span id="final_score">0</span></p>
                <p class="new-highscore-msg hidden" id="new_highscore_msg">🎉 NEW HIGH SCORE! 🎉</p>
            </div>
            <button class="btn" id="restart_btn">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Hidden Asset Images -->
    <div style="display:none;">
        <img id="img_watermelon" src="assets/watermelon.png" alt="watermelon">
        <img id="img_apple" src="assets/apple.png" alt="apple">
        <img id="img_orange" src="assets/orange.png" alt="orange">
        <img id="img_bomb" src="assets/bomb.png" alt="bomb">
    </div>

    <script src="main.js"></script>
</body>
</html>
